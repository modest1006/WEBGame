<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HELLBREAK</title>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <main id="shell">
    <canvas id="view" aria-label="HELLBREAK game canvas"></canvas>
    <canvas id="weapon-view" aria-hidden="true"></canvas>
    <div id="flash"></div>
    <section id="hud">
      <div class="hud-block"><span>HP</span><b id="hp">100</b></div>
      <div class="hud-block"><span>ARMOR</span><b id="armor">0</b></div>
      <canvas id="face" width="96" height="72" aria-hidden="true"></canvas>
      <div class="hud-block"><span id="ammo-label">BUL</span><b id="ammo">INF</b></div>
      <div class="keys"><i id="key-r"></i><i id="key-b"></i><i id="key-y"></i></div>
    </section>
    <header id="topbar">
      <b>HELLBREAK</b>
      <span id="level-name">Level 1</span>
      <button id="mute-btn" type="button">SOUND</button>
    </header>
    <section id="overlay">
      <div>
        <h1 id="overlay-title">HELLBREAK</h1>
        <p id="overlay-copy">Click or tap to enter the fortress.</p>
        <p id="result-line"></p>
        <button id="play-btn" type="button">PLAY</button>
      </div>
    </section>
    <div id="touch-ui">
      <div id="stick"><span></span></div>
      <button id="use-touch" type="button">USE</button>
      <button id="fire-touch" type="button">FIRE</button>
      <div id="weapon-touch">
        <button data-w="pistol" type="button">1</button>
        <button data-w="shotgun" type="button">2</button>
        <button data-w="chaingun" type="button">3</button>
      </div>
    </div>
    <section id="rotate-prompt" class="hidden" aria-live="polite">
      <div class="rotate-icon"><span></span></div>
      <b>横持ちでプレイしてね</b>
    </section>
    <pre id="debug-overlay" class="hidden"></pre>
  </main>
  <script src="lib/three.min.js?v=3"></script>
  <script src="js/constants.js?v=3"></script>
  <script src="js/rng.js?v=3"></script>
  <script src="js/game.js?v=3"></script>
  <script src="js/renderer.js?v=3"></script>
  <script src="js/input.js?v=3"></script>
  <script src="js/audio.js?v=3"></script>
  <script src="js/debug.js?v=3"></script>
  <script src="js/main.js?v=3"></script>
</body>
</html>
