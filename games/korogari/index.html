<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>コロガリ魂 KOROGARI</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>
  <main class="shell">
    <canvas id="view" aria-label="KOROGARI 3D game canvas"></canvas>
    <header class="hud">
      <section class="brand"><b>KOROGARI</b><span id="hud-area">Room</span></section>
      <section class="stats">
        <div><span>DIAMETER</span><b id="hud-diameter">0.40m</b></div>
        <div><span>TARGET</span><b id="hud-target">0.80m</b></div>
        <div><span>TIME</span><b id="hud-time">180</b></div>
        <div><span>COLLECT</span><b id="hud-count">0</b></div>
      </section>
      <section class="buttons">
        <button id="pause-btn" type="button">PAUSE</button>
        <button id="mute-btn" type="button">SOUND</button>
        <button id="restart-btn" type="button">RESTART</button>
      </section>
    </header>
    <div id="ticker" class="ticker"></div>
    <div id="combo" class="combo"></div>
    <div id="flash" class="flash"></div>
    <section id="touch" class="touch">
      <div id="stick" class="stick"><i></i></div>
    </section>
    <section id="overlay" class="overlay">
      <div class="panel">
        <h1 id="overlay-title">コロガリ魂</h1>
        <p id="overlay-sub">小さなものから巻きこんで、5mを目指せ。</p>
        <p id="overlay-result"></p>
        <div class="actions">
          <button id="play-btn" type="button">START</button>
          <button id="again-btn" type="button">RESTART</button>
        </div>
      </div>
    </section>
  </main>
  <pre id="debug-overlay" class="debug-overlay hidden"></pre>
  <script src="lib/three.min.js?v=1"></script>
  <script src="js/rng.js?v=1"></script>
  <script src="js/game.js?v=1"></script>
  <script src="js/renderer.js?v=1"></script>
  <script src="js/input.js?v=1"></script>
  <script src="js/audio.js?v=1"></script>
  <script src="js/debug.js?v=1"></script>
  <script src="js/main.js?v=1"></script>
</body>
</html>
